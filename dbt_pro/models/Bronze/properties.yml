version: 2

models:
  - name: Bronze_date
    config:
       materialized: view

  - name: Bronze_product
    config:
        materialized: view

  - name: Bronze_sales
    columns:
        - name: sales_id
          data_tests:
           - not_null
           - unique
        - name: gross_amount
          data_tests:
           - generic_non_negative

  - name: Bronze_store
    columns:
        - name: store_sk
          data_tests:
           - not_null
           - unique
        - name: store_name
          data_tests:
           - accepted_values:
              arguments:
               values: ['MegaMart Manhattan', 'MegaMart Brooklyn', 'MegaMart Austin', 'MegaMart San Jose', 'MegaMart Toronto']
              config:
               severity: warn
        - name: city
          data_tests:
            - accepted_values:
               arguments:
                values: ['USA', 'Canada', 'Mexico']
               config:
                severity: warn